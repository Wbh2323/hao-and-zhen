<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>豪 & 珍 - 我们的爱情故事</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Noto Serif SC', serif;
            background: #0a0500;
            overflow: hidden;
        }

        /* 开场动画容器 */
        .intro-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a0f00 0%, #0d0700 50%, #1a0f00 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            animation: fadeOut 1s ease-out 10s forwards;
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }

        /* 背景光效 */
        .light-effect {
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 30%, rgba(249,115,22,0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(251,146,60,0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(251,191,36,0.08) 0%, transparent 60%);
            animation: lightMove 10s ease-in-out infinite;
        }

        @keyframes lightMove {
            0%, 100% {
                transform: scale(1) rotate(0deg);
                opacity: 0.8;
            }
            50% {
                transform: scale(1.1) rotate(5deg);
                opacity: 1;
            }
        }

        /* 粒子效果 */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(251,191,36,0.6);
            border-radius: 50%;
            animation: float 8s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) scale(1);
                opacity: 0;
            }
        }

        /* 主要内容 */
        .intro-content {
            position: relative;
            z-index: 10;
            text-align: center;
            color: #fff;
        }

        /* 第一幕：照片展示 (0-3秒) */
        .photo-reveal {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 3rem;
            margin-bottom: 3rem;
        }

        .photo-frame {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid rgba(249,115,22,0.6);
            box-shadow: 
                0 0 60px rgba(249,115,22,0.4),
                0 0 100px rgba(251,191,36,0.2),
                inset 0 0 30px rgba(0,0,0,0.3);
            position: relative;
            opacity: 0;
            transform: scale(0.5);
            animation: photoAppear 2s ease-out 0.5s forwards;
        }

        .photo-frame:nth-child(3) {
            animation-delay: 1s;
        }

        @keyframes photoAppear {
            0% {
                opacity: 0;
                transform: scale(0.5) rotate(-10deg);
            }
            50% {
                transform: scale(1.1) rotate(5deg);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotate(0deg);
            }
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.9) contrast(1.1);
        }

        .photo-frame::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                135deg,
                rgba(249,115,22,0.2) 0%,
                transparent 50%,
                rgba(251,191,36,0.2) 100%
            );
            pointer-events: none;
        }

        /* 爱心连接 */
        .heart-connector {
            font-size: 4rem;
            color: #f97316;
            text-shadow: 0 0 30px rgba(249,115,22,0.8);
            animation: heartPulse 1.5s ease-in-out infinite;
            opacity: 0;
            animation: heartAppear 1s ease-out 1.5s forwards, heartPulse 1.5s ease-in-out 2.5s infinite;
        }

        @keyframes heartAppear {
            from {
                opacity: 0;
                transform: scale(0);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes heartPulse {
            0%, 100% {
                transform: scale(1);
                text-shadow: 0 0 30px rgba(249,115,22,0.8);
            }
            50% {
                transform: scale(1.2);
                text-shadow: 0 0 50px rgba(249,115,22,1);
            }
        }

        /* 第二幕：文字展示 (3-6秒) */
        .title-text {
            font-size: 3.5rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            margin-bottom: 1rem;
            opacity: 0;
            transform: translateY(30px);
            animation: textSlideUp 1.5s ease-out 2.5s forwards;
            text-shadow: 0 4px 20px rgba(249,115,22,0.5);
        }

        @keyframes textSlideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .subtitle-text {
            font-size: 1.3rem;
            color: #fdba74;
            letter-spacing: 0.5em;
            opacity: 0;
            animation: fadeIn 1.5s ease-out 3.5s forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 第三幕：日期展示 (6-9秒) */
        .date-display {
            margin-top: 3rem;
            opacity: 0;
            animation: dateAppear 2s ease-out 5s forwards;
        }

        @keyframes dateAppear {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .date-label {
            font-size: 0.9rem;
            color: #fb923c;
            letter-spacing: 0.3em;
            margin-bottom: 0.5rem;
        }

        .date-value {
            font-size: 2rem;
            color: #fff;
            letter-spacing: 0.2em;
            text-shadow: 0 0 20px rgba(249,115,22,0.6);
        }

        /* 进度条 */
        .progress-bar {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 2px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #f97316, #fbbf24);
            width: 0%;
            animation: progressFill 10s linear forwards;
        }

        @keyframes progressFill {
            to { width: 100%; }
        }

        /* 跳过按钮 */
        .skip-btn {
            position: absolute;
            bottom: 30px;
            right: 30px;
            padding: 8px 20px;
            background: rgba(249,115,22,0.2);
            border: 1px solid rgba(249,115,22,0.4);
            color: #fdba74;
            font-size: 0.85rem;
            cursor: pointer;
            border-radius: 20px;
            transition: all 0.3s ease;
            opacity: 0;
            animation: fadeIn 1s ease-out 2s forwards;
        }

        .skip-btn:hover {
            background: rgba(249,115,22,0.4);
            color: #fff;
        }

        /* 主网站内容（开场后显示） */
        .main-content {
            opacity: 0;
            animation: showMain 1s ease-out 10s forwards;
        }

        @keyframes showMain {
            to { opacity: 1; }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .photo-frame {
                width: 120px;
                height: 120px;
            }

            .photo-reveal {
                gap: 1.5rem;
            }

            .heart-connector {
                font-size: 2.5rem;
            }

            .title-text {
                font-size: 2rem;
                letter-spacing: 0.2em;
            }

            .subtitle-text {
                font-size: 1rem;
                letter-spacing: 0.3em;
            }

            .date-value {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <!-- 开场动画 -->
    <div class="intro-container" id="intro">
        <!-- 背景光效 -->
        <div class="light-effect"></div>
        
        <!-- 粒子效果 -->
        <div class="particles" id="particles"></div>

        <!-- 主要内容 -->
        <div class="intro-content">
            <!-- 照片展示 -->
            <div class="photo-reveal">
                <div class="photo-frame">
                    <img src="assets/him.png" alt="豪">
                </div>
                <div class="heart-connector">💕</div>
                <div class="photo-frame">
                    <img src="assets/her.png" alt="珍">
                </div>
            </div>

            <!-- 标题文字 -->
            <h1 class="title-text">豪 & 珍</h1>
            <p class="subtitle-text">OUR LOVE STORY</p>

            <!-- 日期展示 -->
            <div class="date-display">
                <p class="date-label">SINCE</p>
                <p class="date-value">2025.12.24</p>
            </div>
        </div>

        <!-- 进度条 -->
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>

        <!-- 跳过按钮 -->
        <button class="skip-btn" onclick="skipIntro()">跳过</button>
    </div>

    <!-- 主网站内容 -->
    <div class="main-content">
        <iframe src="main.html" style="width:100%; height:100vh; border:none;"></iframe>
    </div>

    <script>
        // 生成粒子
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 8 + 's';
                particle.style.animationDuration = (6 + Math.random() * 4) + 's';
                container.appendChild(particle);
            }
        }

        // 跳过动画
        function skipIntro() {
            const intro = document.getElementById('intro');
            intro.style.animation = 'fadeOut 0.5s ease-out forwards';
            setTimeout(() => {
                intro.style.display = 'none';
            }, 500);
        }

        // 自动隐藏开场
        setTimeout(() => {
            const intro = document.getElementById('intro');
            intro.style.display = 'none';
        }, 11000);

        // 初始化
        createParticles();
    </script>
</body>
</html>
